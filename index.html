    <!-- JSON-LD Structured Data: FAQ -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "¿Qué es la automatización de procesos empresariales?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "La automatización de procesos conecta tus aplicaciones y herramientas para que las tareas repetitivas se ejecuten solas. Esto libera tiempo a tu equipo para que se centre en lo que realmente importa."
          }
        },
        {
          "@type": "Question",
          "name": "¿Cuánto cuesta implementar automatización con IA en mi empresa?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Los precios varían según la complejidad del proyecto. Nuestros workflows estándar parten desde 600€ de implementación. Para soluciones personalizadas ofrecemos presupuesto gratuito."
          }
        },
        {
          "@type": "Question",
          "name": "¿Core Studios trabaja solo en Mallorca?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Tenemos base en Inca, Mallorca, pero trabajamos con empresas de toda España y a nivel internacional. La mayoría de nuestros servicios digitales se pueden implementar de forma remota."
          }
        },
        {
          "@type": "Question",
          "name": "¿Cuánto tiempo tarda implementar un workflow de automatización?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Un workflow estándar tarda entre 1 y 2 semanas desde la consultoría inicial hasta el despliegue. Las soluciones más complejas pueden requerir entre 4 y 8 semanas."
          }
        }
      ]
    }
    </script>
